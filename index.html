<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        #info-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 12px; text-align: center;
            display: none; z-index: 1000; font-family: sans-serif;
            border-bottom: 4px solid #FFEB3B;
        }
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
        }
        .btn-info {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff;
            background: #00838F; color: white; font-weight: bold; cursor: pointer;
        }
        .btn-info:active { background: #FFEB3B; color: #000; }
    </style>
</head>

<body style="margin:0; overflow:hidden">

    <div id="info-panel">Arahkan kamera ke marker bangun ruang</div>

    <div class="ui-container">
        <button class="btn-info" onclick="handleInteraction(1)">1</button>
        <button class="btn-info" onclick="handleInteraction(2)">2</button>
        <button class="btn-info" onclick="handleInteraction(3)">3</button>
        <button class="btn-info" onclick="handleInteraction(4)">4</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled:false" gesture-detector
             arjs="sourceType:webcam; facingMode:environment; debugUIEnabled: false;"
             cursor="rayOrigin: mouse" raycaster="objects: .clickable">

        <a-marker type="pattern" url="markers/pattern-Balok.patt" id="marker-balok">
            <a-entity class="mainGroup" gesture-handler>
                <a-box id="balok" class="clickable" scale="1.2 0.6 0.6" color="#4CAF50" opacity="0.8">
                    <a-box scale="1.01 1.01 1.01" material="wireframe: true; color: white"></a-box>
                    <a-plane class="h-sisi" position="0 0 0.51" width="0.9" height="0.9" color="yellow" visible="false"></a-plane>
                    <a-box class="h-vol" position="0 -0.5 0" scale="0.95 0 0.95" color="#81C784" visible="false"></a-box>
                </a-box>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Tabung.patt" id="marker-tabung">
            <a-entity class="mainGroup" gesture-handler>
                <a-cylinder id="tabung" class="clickable" radius="0.5" height="1" color="#FF9800" opacity="0.8">
                    <a-cylinder radius="0.505" height="1.005" material="wireframe: true; color: white"></a-cylinder>
                    <a-cylinder class="h-vol" position="0 -0.5 0" radius="0.48" height="0" color="#FFB74D" visible="false"></a-cylinder>
                </a-cylinder>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Kerucut.patt" id="marker-kerucut">
            <a-entity class="mainGroup" gesture-handler>
                <a-cone id="kerucut" class="clickable" radius-bottom="0.5" height="1" color="#F44336" opacity="0.8">
                    <a-cone radius-bottom="0.505" height="1.005" material="wireframe: true; color: white"></a-cone>
                    <a-cone class="h-vol" position="0 -0.5 0" radius-bottom="0.48" height="0" color="#EF5350" visible="false"></a-cone>
                </a-cone>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-bola.patt" id="marker-bola">
            <a-entity class="mainGroup" gesture-handler>
                <a-sphere id="bola" class="clickable" radius="0.6" color="#9C27B0" opacity="0.8">
                    <a-sphere radius="0.605" material="wireframe: true; color: white"></a-sphere>
                    <a-sphere class="h-vol" radius="0.55" color="#BA68C8" opacity="0.6" visible="false"></a-sphere>
                </a-sphere>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const infoPanel = document.getElementById('info-panel');
        let activeMarkerId = "";

        // Deteksi marker mana yang sedang terlihat
        document.querySelectorAll('a-marker').forEach(marker => {
            marker.addEventListener('markerFound', () => { activeMarkerId = marker.id; });
            marker.addEventListener('markerLost', () => { activeMarkerId = ""; infoPanel.style.display = 'none'; });
        });

        const bangunData = {
            "marker-balok": {
                name: "Balok",
                info: [
                    "<strong>Sisi</strong>: Memiliki 6 sisi (3 pasang persegi panjang kongruen).",
                    "<strong>Rusuk/Sudut</strong>: 12 rusuk dan 8 titik sudut.",
                    "<strong>Luas Permukaan</strong>: L = 2 × (pl + pt + lt).",
                    "<strong>Volume</strong>: V = p × l × t."
                ]
            },
            "marker-tabung": {
                name: "Tabung",
                info: [
                    "<strong>Alas & Tutup</strong>: 2 lingkaran sejajar yang identik.",
                    "<strong>Selimut</strong>: Sisi lengkung yang menghubungkan alas dan tutup.",
                    "<strong>Luas</strong>: L = 2πr(r + t).",
                    "<strong>Volume</strong>: V = πr²t."
                ]
            },
            "marker-kerucut": {
                name: "Kerucut",
                info: [
                    "<strong>Alas</strong>: 1 bidang lingkaran.",
                    "<strong>Titik Puncak</strong>: Memiliki 1 titik puncak di bagian atas.",
                    "<strong>Luas</strong>: L = πr(r + s).",
                    "<strong>Volume</strong>: V = 1/3 × πr²t."
                ]
            },
            "marker-bola": {
                name: "Bola",
                info: [
                    "<strong>Sisi</strong>: Hanya memiliki 1 sisi lengkung.",
                    "<strong>Karakteristik</strong>: Tidak memiliki rusuk dan tidak memiliki titik sudut.",
                    "<strong>Luas</strong>: L = 4πr².",
                    "<strong>Volume</strong>: V = 4/3 × πr³."
                ]
            }
        };

        function handleInteraction(num) {
            if (!activeMarkerId) return;

            const data = bangunData[activeMarkerId];
            infoPanel.style.display = 'block';
            infoPanel.innerHTML = `<strong>${data.name}</strong><br>${data.info[num-1]}`;

            // Reset semua visual di marker aktif
            const currentMarker = document.getElementById(activeMarkerId);
            const highlighters = currentMarker.querySelectorAll('.h-sisi, .h-vol');
            const mainShape = currentMarker.querySelector('.clickable');

            highlighters.forEach(h => h.setAttribute('visible', false));
            mainShape.setAttribute('opacity', 0.8);

            // Visualisasi Volume (Nomor 4)
            if (num === 4) {
                mainShape.setAttribute('opacity', 0.3);
                const vol = currentMarker.querySelector('.h-vol');
                if (vol) {
                    vol.setAttribute('visible', true);
                    // Animasi isi (khusus kotak/tabung/kerucut)
                    if (activeMarkerId !== "marker-bola") {
                        vol.setAttribute('animation', {property: 'scale', from: '0.95 0 0.95', to: '0.95 0.95 0.95', dur: 2000});
                    }
                }
            }
        }
    </script>
</body>
</html>
