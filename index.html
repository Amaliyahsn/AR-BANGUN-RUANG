<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden">

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType:webcam; facingMode:environment">

<a-marker type="pattern" url="markers/pattern-kubus.patt">

<!-- ================= GROUP KUBUS ================= -->

<a-entity id="cubeGroup" position="0 0.5 0">

<!-- KUBUS -->

<a-box
id="cube"
color="red"
scale="0.8 0.8 0.8">
</a-box>


<!-- TITIK INFO -->

<a-entity id="p1" position="0.6 0.6 0.6">
<a-circle radius="0.08" color="black"></a-circle>
<a-text value="1" color="white" align="center" position="0 0 0.01"></a-text>
</a-entity>

<a-entity id="p2" position="-0.6 0.6 0.6">
<a-circle radius="0.08" color="black"></a-circle>
<a-text value="2" color="white" align="center" position="0 0 0.01"></a-text>
</a-entity>

<a-entity id="p3" position="0.6 -0.6 0.6">
<a-circle radius="0.08" color="black"></a-circle>
<a-text value="3" color="white" align="center" position="0 0 0.01"></a-text>
</a-entity>

<a-entity id="p4" position="0 0.9 0">
<a-circle radius="0.08" color="black"></a-circle>
<a-text value="4" color="white" align="center" position="0 0 0.01"></a-text>
</a-entity>

</a-entity>


<!-- ================= JARING JARING ================= -->

<a-entity id="cubeNet" visible="false" position="0 0.2 0">

<a-plane width="1" height="1" rotation="-90 0 0" position="0 0 0" color="#4CC3D9"></a-plane>

<a-plane width="1" height="1" rotation="-90 0 0" position="1 0 0" color="#4CC3D9"></a-plane>

<a-plane width="1" height="1" rotation="-90 0 0" position="-1 0 0" color="#4CC3D9"></a-plane>

<a-plane width="1" height="1" rotation="-90 0 0" position="0 0 1" color="#4CC3D9"></a-plane>

<a-plane width="1" height="1" rotation="-90 0 0" position="0 0 -1" color="#4CC3D9"></a-plane>

<a-plane width="1" height="1" rotation="-90 0 0" position="2 0 0" color="#4CC3D9"></a-plane>

</a-entity>


<!-- ================= TEXT INFO ================= -->

<a-text
id="infoText"
value=""
align="center"
position="0 1.8 0"
visible="false"
width="4">
</a-text>

</a-marker>

<a-entity camera cursor="rayOrigin:mouse"></a-entity>

</a-scene>


<script>

// ================= DATA INFO =================

const infoData = {

p1:"Kubus adalah bangun ruang yang memiliki 6 sisi berbentuk persegi yang sama besar.",

p2:"Kubus memiliki 6 sisi, 12 rusuk, dan 8 titik sudut.",

p3:"Luas permukaan kubus = 6 × s².",

p4:"Volume kubus = s³."

}


// ================= EVENT INFO =================

["p1","p2","p3","p4"].forEach(id=>{

document.getElementById(id).addEventListener("click",()=>{

let text=document.getElementById("infoText")

text.setAttribute("value",infoData[id])
text.setAttribute("visible",true)

})

})


// ================= TOGGLE JARING JARING =================

document.getElementById("cube").addEventListener("click",()=>{

let cube=document.getElementById("cubeGroup")
let net=document.getElementById("cubeNet")

let visible=net.getAttribute("visible")

net.setAttribute("visible",!visible)
cube.setAttribute("visible",visible)

})


// ================= DRAG ROTATE =================

let object=document.getElementById("cubeGroup")
let startX

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchmove",e=>{

let dx=e.touches[0].clientX-startX
object.object3D.rotation.y += dx * 0.01

startX=e.touches[0].clientX

})

</script>

</body>
</html>
