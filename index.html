<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; facingMode: environment; debugUIEnabled:false"
    >
      <!-- ================= KUBUS ================= -->

      <a-marker type="pattern" url="markers/pattern-kubus.patt">
        <a-box
          id="kubus"
          position="0 0.5 0"
          scale="0.8 0.8 0.8"
          color="blue"
          animation="property: rotation; to:0 360 0; loop:true; dur:4000"
        >
        </a-box>

        <!-- LINE BUTTON -->

        <a-plane
          id="k1"
          position="-1 0.6 0"
          width="0.8"
          height="0.25"
          color="#222"
        ></a-plane>
        <a-plane
          id="k2"
          position="1 0.6 0"
          width="0.8"
          height="0.25"
          color="#222"
        ></a-plane>
        <a-plane
          id="k3"
          position="0 1.4 0"
          width="0.8"
          height="0.25"
          color="#222"
        ></a-plane>
        <a-plane
          id="k4"
          position="0 -0.2 0"
          width="0.8"
          height="0.25"
          color="#222"
        ></a-plane>

        <!-- INFO TEXT -->

        <a-text
          id="kInfo1"
          value="Kubus adalah bangun ruang dengan semua sisi sama panjang"
          position="0 1.8 0"
          align="center"
          visible="false"
        ></a-text>

        <a-text
          id="kInfo2"
          value="Jumlah sisi = 6"
          position="0 1.8 0"
          align="center"
          visible="false"
        ></a-text>

        <a-text
          id="kInfo3"
          value="Luas permukaan = 6s²"
          position="0 1.8 0"
          align="center"
          visible="false"
        ></a-text>

        <a-text
          id="kInfo4"
          value="Volume = s³"
          position="0 1.8 0"
          align="center"
          visible="false"
        ></a-text>

        <!-- JARING JARING -->

        <a-image
          id="netKubus"
          src="Gambar/net-kubus.png"
          position="0 0.7 0"
          scale="2 2 2"
          visible="false"
        >
        </a-image>
      </a-marker>

      <!-- ================= BALOK ================= -->

      <a-marker type="pattern" url="markers/pattern-Balok.patt">
        <a-box
          id="balok"
          position="0 0.5 0"
          scale="0.8 0.5 0.5"
          color="green"
          animation="property: rotation; to:0 360 0; loop:true; dur:4000"
        >
        </a-box>

        <a-text
          id="balokInfo"
          value="Balok memiliki 6 sisi"
          position="0 1.5 0"
          visible="false"
          align="center"
        >
        </a-text>

        <a-image
          id="netBalok"
          src="Gambar/net-balok.png"
          position="0 0.8 0"
          scale="2 2 2"
          visible="false"
        >
        </a-image>
      </a-marker>

      <!-- ================= TABUNG ================= -->

      <a-marker type="pattern" url="markers/pattern-Tabung.patt">
        <a-cylinder
          id="tabung"
          radius="0.5"
          height="1"
          color="orange"
          animation="property: rotation; to:0 360 0; loop:true; dur:4000"
        >
        </a-cylinder>

        <a-text
          id="tabungInfo"
          value="Volume = πr²t"
          position="0 1.5 0"
          visible="false"
          align="center"
        >
        </a-text>
      </a-marker>

      <!-- ================= KERUCUT ================= -->

      <a-marker type="pattern" url="markers/pattern-Kerucut.patt">
        <a-cone
          id="kerucut"
          radius-bottom="0.5"
          height="1"
          color="red"
          animation="property: rotation; to:0 360 0; loop:true; dur:4000"
        >
        </a-cone>

        <a-text
          id="kerucutInfo"
          value="Volume = 1/3 πr²t"
          position="0 1.5 0"
          visible="false"
          align="center"
        >
        </a-text>
      </a-marker>

      <!-- ================= BOLA ================= -->

      <a-marker type="pattern" url="markers/pattern-bola.patt">
        <a-sphere
          id="bola"
          radius="0.5"
          color="purple"
          animation="property: rotation; to:0 360 0; loop:true; dur:4000"
        >
        </a-sphere>

        <a-text
          id="bolaInfo"
          value="Volume = 4/3 πr³"
          position="0 1.5 0"
          visible="false"
          align="center"
        >
        </a-text>
      </a-marker>

      <a-entity camera cursor="rayOrigin: mouse"></a-entity>
    </a-scene>

    <script>
      function showInfo(button, info) {
        document.querySelector(button).addEventListener("click", function () {
          document.querySelector("#kInfo1").setAttribute("visible", false);
          document.querySelector("#kInfo2").setAttribute("visible", false);
          document.querySelector("#kInfo3").setAttribute("visible", false);
          document.querySelector("#kInfo4").setAttribute("visible", false);

          document.querySelector(info).setAttribute("visible", true);
        });
      }

      function showNet(shape, net) {
        document.querySelector(shape).addEventListener("click", function () {
          let visible = document.querySelector(net).getAttribute("visible");

          document.querySelector(net).setAttribute("visible", !visible);
        });
      }

      window.onload = function () {
        showInfo("#k1", "#kInfo1");
        showInfo("#k2", "#kInfo2");
        showInfo("#k3", "#kInfo3");
        showInfo("#k4", "#kInfo4");

        showNet("#kubus", "#netKubus");
        showNet("#balok", "#netBalok");
      };
    </script>
  </body>
</html>
