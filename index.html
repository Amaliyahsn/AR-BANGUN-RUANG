<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        #info-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 12px; text-align: center;
            display: none; z-index: 1000; font-family: sans-serif;
            border-bottom: 4px solid #FFEB3B;
        }
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
        }
        .btn-info {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff;
            background: #00838F; color: white; font-weight: bold; cursor: pointer;
        }
        .btn-info:active { background: #FFEB3B; color: #000; }
    </style>
</head>

<body style="margin:0; overflow:hidden">

    <div id="info-panel">Arahkan ke marker dan ketuk bangun untuk Mode Jaring-jaring</div>

    <div class="ui-container">
        <button class="btn-info" onclick="handleInteraction(1)">1</button>
        <button class="btn-info" onclick="handleInteraction(2)">2</button>
        <button class="btn-info" onclick="handleInteraction(3)">3</button>
        <button class="btn-info" onclick="handleInteraction(4)">4</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled:false" gesture-detector
             arjs="sourceType:webcam; facingMode:environment; debugUIEnabled: false;"
             cursor="rayOrigin: mouse" raycaster="objects: .clickable">

        <a-marker type="pattern" url="markers/pattern-kubus.patt" id="marker-kubus">
            <a-entity id="group-kubus" gesture-handler>
                <a-box id="obj-kubus" class="clickable" onclick="toggleNet('kubus')" position="0 0.5 0" color="#00ACC1" opacity="0.8">
                    <a-box scale="1.01 1.01 1.01" material="wireframe: true; color: white"></a-box>
                    <a-plane class="h-sisi" position="0 0 0.51" width="0.8" height="0.8" color="yellow" visible="false"></a-plane>
                    <a-box class="h-vol" position="0 -0.5 0" scale="0.98 0 0.98" color="#4DD0E1" visible="false"></a-box>
                </a-box>
                <a-entity id="net-kubus" visible="false" rotation="-90 0 0">
                    <a-plane position="0 0 0" color="#00ACC1" material="side: double"></a-plane>
                    <a-plane position="1 0 0" color="#00ACC1"></a-plane>
                    <a-plane position="-1 0 0" color="#00ACC1"></a-plane>
                    <a-plane position="0 1 0" color="#00ACC1"></a-plane>
                    <a-plane position="0 -1 0" color="#00ACC1"></a-plane>
                    <a-plane position="0 -2 0" color="#00ACC1"></a-plane>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Balok.patt" id="marker-balok">
            <a-entity id="group-balok" gesture-handler>
                <a-box id="obj-balok" class="clickable" onclick="toggleNet('balok')" position="0 0.3 0" width="1.5" height="0.6" depth="0.8" color="#4CAF50" opacity="0.8">
                    <a-box width="1.51" height="0.61" depth="0.81" material="wireframe: true; color: white"></a-box>
                    <a-plane class="h-sisi" position="0 0 0.41" width="1.3" height="0.4" color="yellow" visible="false"></a-plane>
                    <a-box class="h-vol" position="0 -0.3 0" width="1.45" height="0" depth="0.75" color="#81C784" visible="false"></a-box>
                </a-box>
                <a-entity id="net-balok" visible="false" rotation="-90 0 0">
                    <a-plane width="1.5" height="0.8" position="0 0 0" color="#4CAF50"></a-plane>
                    <a-plane width="1.5" height="0.6" position="0 0.7 0" color="#4CAF50"></a-plane>
                    <a-plane width="1.5" height="0.6" position="0 -0.7 0" color="#4CAF50"></a-plane>
                    <a-plane width="1.5" height="0.8" position="0 -1.4 0" color="#4CAF50"></a-plane>
                    <a-plane width="0.6" height="0.8" position="1.05 0 0" color="#4CAF50"></a-plane>
                    <a-plane width="0.6" height="0.8" position="-1.05 0 0" color="#4CAF50"></a-plane>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Tabung.patt" id="marker-tabung">
            <a-entity id="group-tabung" gesture-handler>
                <a-cylinder id="obj-tabung" class="clickable" onclick="toggleNet('tabung')" position="0 0.5 0" radius="0.5" height="1.2" color="#FF9800" opacity="0.8">
                    <a-circle class="h-sisi" position="0 0.61 0" rotation="-90 0 0" radius="0.4" color="yellow" visible="false"></a-circle>
                    <a-cylinder class="h-vol" position="0 -0.6 0" radius="0.48" height="0" color="#FFB74D" visible="false"></a-cylinder>
                </a-cylinder>
                <a-entity id="net-tabung" visible="false" rotation="-90 0 0">
                    <a-plane width="3.14" height="1.2" position="0 0 0" color="#FF9800"></a-plane>
                    <a-circle radius="0.5" position="0 1.1 0" color="#FF9800"></a-circle>
                    <a-circle radius="0.5" position="0 -1.1 0" color="#FF9800"></a-circle>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Kerucut.patt" id="marker-kerucut">
            <a-entity id="group-kerucut" gesture-handler>
                <a-cone id="obj-kerucut" class="clickable" onclick="toggleNet('kerucut')" position="0 0.5 0" radius-bottom="0.6" height="1.2" color="#F44336" opacity="0.8">
                    <a-circle class="h-sisi" position="0 -0.59 0" rotation="90 0 0" radius="0.5" color="yellow" visible="false"></a-circle>
                    <a-cone class="h-vol" position="0 -0.6 0" radius-bottom="0.58" height="0" color="#EF5350" visible="false"></a-cone>
                </a-cone>
                <a-entity id="net-kerucut" visible="false" rotation="-90 0 0">
                    <a-circle radius="0.6" position="0 -0.7 0" color="#F44336"></a-circle>
                    <a-entity geometry="primitive: circle; radius: 1.3; thetaStart: 0; thetaLength: 160" material="color: #F44336; side: double" position="0 0.5 0" rotation="0 0 -80"></a-entity>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-bola.patt" id="marker-bola">
            <a-entity id="group-bola" gesture-handler>
                <a-sphere id="obj-bola" class="clickable" onclick="toggleNet('bola')" position="0 0.5 0" radius="0.6" color="#9C27B0" opacity="0.8">
                    <a-sphere radius="0.61" material="wireframe: true; color: yellow" class="h-sisi" visible="false"></a-sphere>
                    <a-sphere class="h-vol" radius="0.55" color="#BA68C8" opacity="0.6" visible="false"></a-sphere>
                </a-sphere>
                <a-entity id="net-bola" visible="false">
                    <a-torus radius="0.6" tube="0.01" rotation="90 0 0" color="white"></a-torus>
                    <a-torus radius="0.6" tube="0.01" rotation="0 90 0" color="white"></a-torus>
                    <a-torus radius="0.6" tube="0.01" rotation="0 0 0" color="white"></a-torus>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const infoPanel = document.getElementById('info-panel');
        let activeMarkerId = "";

        // Deteksi Marker
        document.querySelectorAll('a-marker').forEach(m => {
            m.addEventListener('markerFound', () => { 
                activeMarkerId = m.id; 
                infoPanel.style.display = 'block';
                infoPanel.innerHTML = "Ketuk Bangun untuk Mode Jaring-jaring";
            });
            m.addEventListener('markerLost', () => { if(activeMarkerId === m.id) { activeMarkerId = ""; infoPanel.style.display = 'none'; } });
        });

        // Toggle Jaring-jaring
        function toggleNet(type) {
            const obj = document.getElementById(`obj-${type}`);
            const net = document.getElementById(`net-${type}`);
            const isVisible = net.getAttribute('visible');
            
            net.setAttribute('visible', !isVisible);
            obj.setAttribute('visible', isVisible);
            
            infoPanel.innerHTML = isVisible ? "Mode Bangun Ruang" : "Mode Jaring-jaring (Ketuk lagi untuk kembali)";
        }

        const materi = {
            "marker-kubus": ["Sisi: 6 persegi sama luas (Warna Kuning)", "Rusuk: 12 garis pertemuan sisi", "L = 6s²", "V = s³"],
            "marker-balok": ["Sisi: Sisi depan/belakang/alas (Kuning)", "Rusuk: 12 rusuk (4p, 4l, 4t)", "L = 2(pl + pt + lt)", "V = p × l × t"],
            "marker-tabung": ["Sisi Alas: Berbentuk Lingkaran (Kuning)", "Selimut: Sisi lengkung tabung", "L = 2πr(r + t)", "V = πr²t"],
            "marker-kerucut": ["Alas: Lingkaran di bawah (Kuning)", "Selimut: Sisi tegak melengkung", "L = πr(r + s)", "V = 1/3πr²t"],
            "marker-bola": ["Sisi: 1 Sisi Lengkung (Garis Kuning)", "Pusat: Titik tengah bola", "L = 4πr²", "V = 4/3πr³"]
        };

        function handleInteraction(num) {
            if (!activeMarkerId) return;
            const currentMateri = materi[activeMarkerId];
            const markerEl = document.getElementById(activeMarkerId);
            const mainObj = markerEl.querySelector('.clickable');
            const volObj = markerEl.querySelector('.h-vol');
            const sisiObj = markerEl.querySelector('.h-sisi');

            infoPanel.innerHTML = `<strong>${activeMarkerId.split('-')[1].toUpperCase()}</strong><br>${currentMateri[num-1]}`;

            // Reset
            volObj.setAttribute('visible', false);
            if(sisiObj) sisiObj.setAttribute('visible', false);
            mainObj.setAttribute('opacity', 0.8);

            // Sisi / Alas (1)
            if (num === 1 && sisiObj) sisiObj.setAttribute('visible', true);

            // Volume (4)
            if (num === 4) {
                mainObj.setAttribute('opacity', 0.2);
                volObj.setAttribute('visible', true);
                if (activeMarkerId !== "marker-bola") {
                    volObj.setAttribute('animation', { property: 'scale', from: '0.95 0 0.95', to: '0.95 0.95 0.95', dur: 2000 });
                }
            }
        }
    </script>
</body>
</html>
