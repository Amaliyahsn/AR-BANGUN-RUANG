<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        #info-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 12px; text-align: center;
            display: none; z-index: 1000; font-family: sans-serif;
            border-bottom: 4px solid #FFEB3B;
        }
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
        }
        .btn-info {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff;
            background: #00838F; color: white; font-weight: bold; cursor: pointer;
        }
        .btn-info:active { background: #FFEB3B; color: #000; }
    </style>
</head>

<body style="margin:0; overflow:hidden">

    <div id="info-panel">Arahkan kamera ke marker</div>

    <div class="ui-container">
        <button class="btn-info" onclick="handleInteraction(1)">1</button>
        <button class="btn-info" onclick="handleInteraction(2)">2</button>
        <button class="btn-info" onclick="handleInteraction(3)">3</button>
        <button class="btn-info" onclick="handleInteraction(4)">4</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled:false" gesture-detector
             arjs="sourceType:webcam; facingMode:environment; debugUIEnabled: false;"
             cursor="rayOrigin: mouse" raycaster="objects: .clickable">

        <a-marker type="pattern" url="markers/pattern-kubus.patt" id="marker-kubus" class="marker-class">
            <a-entity gesture-handler>
                <a-box id="obj-kubus" class="clickable" position="0 0.5 0" color="blue" opacity="0.8">
                    <a-box scale="1.01 1.01 1.01" material="wireframe: true; color: white"></a-box>
                    <a-box class="h-vol" position="0 -0.5 0" scale="0.95 0 0.95" color="#4DD0E1" visible="false"></a-box>
                </a-box>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Balok.patt" id="marker-balok" class="marker-class">
            <a-entity gesture-handler>
                <a-box id="obj-balok" class="clickable" position="0 0.5 0" depth="1.5" height="0.5" width="1" color="green" opacity="0.8">
                    <a-box scale="1.01 1.01 1.01" material="wireframe: true; color: white"></a-box>
                    <a-box class="h-vol" position="0 -0.5 0" scale="0.95 0 0.95" color="#81C784" visible="false"></a-box>
                </a-box>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Tabung.patt" id="marker-tabung" class="marker-class">
            <a-entity gesture-handler>
                <a-cylinder id="obj-tabung" class="clickable" position="0 0.5 0" radius="0.4" height="1" color="orange" opacity="0.8">
                    <a-cylinder radius="0.405" height="1.005" material="wireframe: true; color: white"></a-cylinder>
                    <a-cylinder class="h-vol" position="0 -0.5 0" radius="0.38" height="0" color="#FFB74D" visible="false"></a-cylinder>
                </a-cylinder>
            </a-entity>
        </a-marker>

        <a-marker type="pattern" url="markers/pattern-Kerucut.patt" id="marker-kerucut" class="marker-class">
            <a-entity gesture-handler>
                <a-cone id="obj-kerucut" class="clickable" position="0 0.5 0" radius-bottom="0.5" height="1" color="red" opacity="0.8">
                    <a-cone radius-bottom="0.505" height="1.005" material="wireframe: true; color: white"></a-cone>
                    <a-cone class="h-vol" position="0 -0.5 0" radius-bottom="0.48" height="0" color="#EF5350" visible="false"></a-cone>
                </a-entity>
            </a-marker>

        <a-marker type="pattern" url="markers/pattern-bola.patt" id="marker-bola" class="marker-class">
            <a-entity gesture-handler>
                <a-sphere id="obj-bola" class="clickable" position="0 0.5 0" radius="0.5" color="purple" opacity="0.8">
                    <a-sphere radius="0.505" material="wireframe: true; color: white"></a-sphere>
                    <a-sphere class="h-vol" radius="0.45" color="#BA68C8" opacity="0.6" visible="false"></a-sphere>
                </a-sphere>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const infoPanel = document.getElementById('info-panel');
        let activeMarkerId = "";

        // Fungsi pendeteksi marker aktif
        document.querySelectorAll('.marker-class').forEach(marker => {
            marker.addEventListener('markerFound', () => { 
                activeMarkerId = marker.id;
                infoPanel.style.display = 'block';
                infoPanel.innerHTML = "Marker terdeteksi! Klik angka untuk detail.";
            });
            marker.addEventListener('markerLost', () => { 
                activeMarkerId = ""; 
                infoPanel.style.display = 'none'; 
            });
        });

        const dataMateri = {
            "marker-kubus": ["6 sisi persegi identik", "12 rusuk sama panjang", "L = 6s²", "V = s³"],
            "marker-balok": ["6 sisi (3 pasang persegi panjang)", "12 rusuk & 8 titik sudut", "L = 2(pl+pt+lt)", "V = p×l×t"],
            "marker-tabung": ["Alas & Tutup lingkaran sejajar", "Memiliki 1 sisi selimut", "L = 2πr(r+t)", "V = πr²t"],
            "marker-kerucut": ["Alas lingkaran & 1 titik puncak", "Memiliki garis pelukis (s)", "L = πr(r+s)", "V = 1/3πr²t"],
            "marker-bola": ["Dibatasi 1 sisi lengkung", "Tidak punya rusuk/titik sudut", "L = 4πr²", "V = 4/3πr³"]
        };

        function handleInteraction(num) {
            if (!activeMarkerId) return;

            const materi = dataMateri[activeMarkerId];
            infoPanel.innerHTML = `<strong>${activeMarkerId.replace('marker-', '').toUpperCase()}</strong><br>${materi[num-1]}`;

            const currentMarker = document.getElementById(activeMarkerId);
            const mainObj = currentMarker.querySelector('.clickable');
            const volObj = currentMarker.querySelector('.h-vol');

            // Reset
            volObj.setAttribute('visible', false);
            mainObj.setAttribute('opacity', 0.8);

            // Animasi Volume (Tombol 4)
            if (num === 4) {
                mainObj.setAttribute('opacity', 0.2);
                volObj.setAttribute('visible', true);
                if (activeMarkerId !== "marker-bola") {
                    volObj.setAttribute('animation', {property: 'scale', from: '0.95 0 0.95', to: '0.95 0.95 0.95', dur: 2000});
                }
            }
        }
    </script>
</body>
</html>
