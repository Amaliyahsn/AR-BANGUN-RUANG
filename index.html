<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        #info-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.85); color: white;
            padding: 15px; border-radius: 12px; text-align: center;
            display: none; z-index: 1000; font-family: sans-serif;
            border-bottom: 4px solid #FFEB3B;
        }
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
        }
        .btn-info {
            width: 50px; height: 50px; border-radius: 50%; border: 3px solid #fff;
            background: #00838F; color: white; font-weight: bold; cursor: pointer;
        }
        .btn-info:active { background: #FFEB3B; color: #000; }
    </style>
</head>

<body style="margin:0; overflow:hidden">

    <div id="info-panel">Klik angka untuk visualisasi bagian kubus</div>

    <div class="ui-container">
        <button class="btn-info" onclick="showInfo(1)">1</button>
        <button class="btn-info" onclick="showInfo(2)">2</button>
        <button class="btn-info" onclick="showInfo(3)">3</button>
        <button class="btn-info" onclick="showInfo(4)">4</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled:false" gesture-detector
             arjs="sourceType:webcam; facingMode:environment; debugUIEnabled: false;"
             cursor="rayOrigin: mouse" raycaster="objects: .clickable">

        <a-marker type="pattern" url="markers/pattern-kubus.patt">
            <a-entity id="mainGroup" gesture-handler>
                
                <a-entity id="cubeGroup" visible="true">
                    <a-box id="mainCube" class="clickable" onclick="toggleShape()" color="#00ACC1" opacity="0.8">
                        <a-box scale="1.002 1.002 1.002" material="wireframe: true; color: white"></a-box>
                    </a-box>
                    <a-plane id="mark-sisi-cube" position="0 0 0.51" width="0.8" height="0.8" color="yellow" opacity="0.6" visible="false"></a-plane>
                    <a-entity id="mark-rusuk-cube" visible="false">
                        <a-sphere position="0.5 0.5 0.5" radius="0.06" color="yellow"></a-sphere>
                        <a-sphere position="-0.5 0.5 0.5" radius="0.06" color="yellow"></a-sphere>
                        <a-sphere position="0.5 -0.5 0.5" radius="0.06" color="yellow"></a-sphere>
                        <a-sphere position="-0.5 -0.5 0.5" radius="0.06" color="yellow"></a-sphere>
                    </a-entity>
                    <a-box id="mark-vol-cube" position="0 -0.5 0" scale="0.95 0 0.95" color="#4DD0E1" opacity="0.6" visible="false"></a-box>
                </a-entity>

                <a-entity id="cubeNet" visible="false">
                    <a-entity rotation="-90 0 0">
                        <a-entity position="0 0 0" class="clickable" onclick="toggleShape()">
                            <a-plane id="net-plane-1" color="#00ACC1"></a-plane>
                            <a-box scale="1 1 0.02" material="wireframe:true; color:white"></a-box>
                            <a-entity class="net-dots" visible="false">
                                <a-sphere position="0.5 0.5 0.05" radius="0.05" color="yellow"></a-sphere>
                                <a-sphere position="-0.5 0.5 0.05" radius="0.05" color="yellow"></a-sphere>
                                <a-sphere position="0.5 -0.5 0.05" radius="0.05" color="yellow"></a-sphere>
                                <a-sphere position="-0.5 -0.5 0.05" radius="0.05" color="yellow"></a-sphere>
                            </a-entity>
                        </a-entity>
                        <a-entity position="1 0 0" class="clickable" onclick="toggleShape()"><a-plane color="#00ACC1"></a-plane><a-box scale="1 1 0.02" material="wireframe:true; color:white"></a-box></a-entity>
                        <a-entity position="-1 0 0" class="clickable" onclick="toggleShape()"><a-plane color="#00ACC1"></a-plane><a-box scale="1 1 0.02" material="wireframe:true; color:white"></a-box></a-entity>
                        <a-entity position="0 1 0" class="clickable" onclick="toggleShape()"><a-plane color="#00ACC1"></a-plane><a-box scale="1 1 0.02" material="wireframe:true; color:white"></a-box></a-entity>
                        <a-entity position="0 -1 0" class="clickable" onclick="toggleShape()"><a-plane color="#00ACC1"></a-plane><a-box scale="1 1 0.02" material="wireframe:true; color:white"></a-box></a-entity>
                        <a-entity position="2 0 0" class="clickable" onclick="toggleShape()"><a-plane color="#00ACC1"></a-plane><a-box scale="1 1 0.02" material="wireframe:true; color:white"></a-box></a-entity>
                    </a-entity>
                </a-entity>

            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const infoPanel = document.getElementById('info-panel');
        const cubeGroup = document.getElementById('cubeGroup');
        const cubeNet = document.getElementById('cubeNet');
        const mainCube = document.getElementById('mainCube');

        function showInfo(num) {
            const isNet = cubeNet.getAttribute('visible');
            infoPanel.style.display = 'block';
            resetMarkers();

            if (num === 1) {
                infoPanel.innerHTML = "<strong>Sisi</strong>: Bidang datar pembentuk kubus. Jaring-jaring terdiri dari 6 sisi.";
                if(isNet) document.getElementById('net-plane-1').setAttribute('color', 'yellow');
                else document.getElementById('mark-sisi-cube').setAttribute('visible', true);
            } 
            else if (num === 2 || num === 3) {
                infoPanel.innerHTML = num === 2 ? "<strong>Rusuk</strong>: Pertemuan dua sisi kubus (Garis putih)." : "<strong>Sudut</strong>: Titik pertemuan rusuk (Titik kuning).";
                if(isNet) document.querySelectorAll('.net-dots').forEach(d => d.setAttribute('visible', true));
                else document.getElementById('mark-rusuk-cube').setAttribute('visible', true);
            } 
            else if (num === 4) {
                if(isNet) {
                    infoPanel.innerHTML = "<strong>Volume</strong>: Kapasitas ruang. Rakit jaring-jaring menjadi kubus untuk melihat volume.";
                } else {
                    infoPanel.innerHTML = "<strong>Volume</strong>: Isi ruang di dalam kubus (Sisi x Sisi x Sisi).";
                    mainCube.setAttribute('opacity', 0.2);
                    const v = document.getElementById('mark-vol-cube');
                    v.setAttribute('visible', true);
                    v.setAttribute('animation__fill', {property: 'scale', from: '0.95 0 0.95', to: '0.95 0.95 0.95', dur: 2000});
                    v.setAttribute('animation__pos', {property: 'position', from: '0 -0.5 0', to: '0 0 0', dur: 2000});
                }
            }
        }

        function resetMarkers() {
            document.getElementById('mark-sisi-cube').setAttribute('visible', false);
            document.getElementById('mark-rusuk-cube').setAttribute('visible', false);
            document.getElementById('mark-vol-cube').setAttribute('visible', false);
            document.getElementById('net-plane-1').setAttribute('color', '#00ACC1');
            document.querySelectorAll('.net-dots').forEach(d => d.setAttribute('visible', false));
            mainCube.setAttribute('opacity', 0.8);
        }

        function toggleShape() {
            const isCube = cubeGroup.getAttribute('visible');
            cubeGroup.setAttribute('visible', !isCube);
            cubeNet.setAttribute('visible', isCube);
            resetMarkers();
            infoPanel.style.display = 'none';
        }
    </script>
</body>
</html>
